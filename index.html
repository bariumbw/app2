<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Card Designer Pro - Bespoke Mall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --wedding-red: #632A31;
            --accent-blue: #3b82f6;
            --glass-bg: rgba(15, 23, 42, 0.8);
        }
        
        body {
            background: #020617;
            font-family: 'Inter', 'Noto Serif TC', sans-serif;
            color: #f8fafc;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 側邊欄玻璃擬態 */
        .glass-sidebar {
            width: 420px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            z-index: 50;
            box-shadow: 20px 0 50px rgba(0,0,0,0.5);
        }

        .nav-tabs {
            display: flex;
            padding: 20px 20px 0;
            gap: 10px;
        }

        .tab-trigger {
            flex: 1;
            padding: 12px 5px;
            font-size: 0.8rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            color: #94a3b8;
            border-radius: 12px 12px 0 0;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }

        .tab-trigger.active {
            color: #fff;
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.2) 0%, rgba(59, 130, 246, 0) 100%);
            border-color: rgba(59, 130, 246, 0.5);
            border-bottom: none;
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            scrollbar-width: none;
        }

        .input-group { margin-bottom: 20px; }
        .input-group label {
            display: block;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #64748b;
            margin-bottom: 8px;
        }
        .input-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px 15px;
            color: #fff;
            font-size: 0.9rem;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.05);
        }

        /* 預覽區域 */
        .preview-container {
            flex: 1;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            padding: 50px;
        }

        .card-canvas {
            width: 1000px;
            height: 707px;
            min-width: 1000px;
            position: relative;
            background-image: url('5.jpg');
            background-size: cover;
            box-shadow: 0 60px 120px -20px rgba(0,0,0,0.7);
        }

        /* 文字預覽 - 再次向上移 7 格 (累計 14 格/28px) */
        .preview-item {
            position: absolute;
            color: var(--wedding-red);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            pointer-events: none;
        }

        /* 西式定位二次修正 */
        #pre-bE { top: 47px; left: 40px; width: 280px; height: 95px; font-family: 'Georgia', serif; font-style: italic; font-size: 40px; }
        #pre-gE { top: 217px; left: 220px; width: 270px; height: 95px; font-family: 'Georgia', serif; font-style: italic; font-size: 40px; }
        #pre-dE { top: 457px; left: 100px; width: 335px; height: 35px; font-weight: bold; font-size: 20px; }
        #pre-vE { top: 517px; left: 80px; width: 335px; height: 35px; font-weight: bold; font-size: 18px; }
        #pre-aE { top: 597px; left: 22px; width: 450px; height: 55px; font-size: 14px; align-items: flex-start; }

        /* 中式定位二次修正 */
        .v-text { writing-mode: vertical-rl; line-height: 1.2; }
        #pre-dC { top: 257px; right: 28px; height: 400px; width: 40px; font-size: 18px; }
        #pre-lu { top: 257px; right: 75px; height: 400px; width: 40px; font-size: 16px; }
        #pre-gC { top: 177px; right: 125px; height: 110px; width: 30px; font-weight: bold; font-size: 20px; }
        #pre-bC { top: 177px; right: 155px; height: 110px; width: 30px; font-weight: bold; font-size: 20px; }
        #pre-vN { top: 177px; right: 215px; height: 380px; width: 30px; font-size: 18px; }
        #pre-vA { top: 177px; right: 245px; height: 380px; width: 30px; font-size: 14px; }
        
        /* 父母名定位二次修正 */
        .parent-box { top: 507px; right: 325px; width: 140px; height: 95px; display: flex; flex-direction: row-reverse; gap: 8px; }
        .p-name { writing-mode: vertical-rl; width: 28px; height: 100%; font-size: 18px; font-weight: bold; }

        /* 底部產品顯示二次修正 (同樣向上移) */
        .footer-pre { position: absolute; bottom: 63px; width: 455px; height: 145px; display: flex; gap: 15px; padding: 10px; }
        .footer-left { left: 22px; } .footer-right { right: 22px; }
        .pre-logo { width: 110px; height: 100%; display: flex; align-items: center; justify-content: center; }
        .pre-logo img { max-width: 100%; max-height: 50px; }
        .pre-info { flex: 1; text-align: left; display: flex; flex-direction: column; justify-content: flex-start; }
        .pre-pname { font-weight: bold; font-size: 16px; height: 25px; margin-bottom: 5px; color: var(--wedding-red); }
        .pre-tc { font-size: 10px; line-height: 1.2; overflow: hidden; color: var(--wedding-red); }

        .prod-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 15px; margin-bottom: 12px; }
    </style>
</head>
<body>

    <div class="flex h-screen">
        <aside class="glass-sidebar">
            <div class="p-6">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white shadow-lg shadow-blue-500/20">B</div>
                    <span class="text-xl font-bold tracking-tight">Bespoke Mall <span class="text-blue-500 text-xs">APP V2</span></span>
                </div>
            </div>

            <div class="nav-tabs">
                <div class="tab-trigger active" onclick="switchTab(event, 'tab-w')">WESTERN</div>
                <div class="tab-trigger" onclick="switchTab(event, 'tab-e')">CHINESE</div>
                <div class="tab-trigger" onclick="switchTab(event, 'tab-p')">VOUCHER</div>
            </div>

            <div class="scroll-area">
                <div id="tab-w" class="tab-content">
                    <div class="input-group"><label>Bride Name</label><input type="text" id="in-bE" value="Rosesalina" oninput="render()"></div>
                    <div class="input-group"><label>Groom Name</label><input type="text" id="in-gE" value="Benjamin" oninput="render()"></div>
                    <div class="input-group"><label>Wedding Date</label><input type="date" id="in-dE" value="2026-10-15" oninput="render()"></div>
                    <div class="input-group"><label>Venue Name</label><input type="text" id="in-vE" value="FOUR SEASONS GRAND BALLROOM" oninput="render()"></div>
                    <div class="input-group"><label>Venue Address</label><input type="text" id="in-aE" value="8 FINANCE STREET, CENTRAL, HONG KONG" oninput="render()"></div>
                </div>

                <div id="tab-e" class="tab-content hidden">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="input-group"><label>新娘</label><input type="text" id="in-bC" value="嘉欣" oninput="render()"></div>
                        <div class="input-group"><label>新郎</label><input type="text" id="in-gC" value="大文" oninput="render()"></div>
                    </div>
                    <div class="input-group"><label>公曆日期</label><input type="date" id="in-dC" value="2026-10-15" oninput="render()"></div>
                    <div class="input-group"><label>農曆日期</label><input type="text" id="in-lu" value="丙午年九月 初六" oninput="render()"></div>
                    <div class="input-group"><label>場地名稱</label><input type="text" id="in-vN" value="香港四季酒店 · 四季大禮堂" oninput="render()"></div>
                    <div class="input-group"><label>場地地址</label><input type="text" id="in-vA" value="香港中環金融街 8 號" oninput="render()"></div>
                    <div class="grid grid-cols-2 gap-2 mt-4">
                        <div class="input-group"><label>新娘父</label><input type="text" id="in-bF" value="嘉誠" oninput="render()"></div>
                        <div class="input-group"><label>新娘母</label><input type="text" id="in-bM" value="美玲" oninput="render()"></div>
                        <div class="input-group"><label>新郎父</label><input type="text" id="in-gF" value="建國" oninput="render()"></div>
                        <div class="input-group"><label>新郎母</label><input type="text" id="in-gM" value="麗珍" oninput="render()"></div>
                    </div>
                </div>

                <div id="tab-p" class="tab-content hidden">
                    <div id="product-list"></div>
                </div>
            </div>
        </aside>

        <main class="preview-container">
            <div id="card" class="card-canvas">
                <div id="pre-bE" class="preview-item"></div>
                <div id="pre-gE" class="preview-item"></div>
                <div id="pre-dE" class="preview-item"></div>
                <div id="pre-vE" class="preview-item"></div>
                <div id="pre-aE" class="preview-item"></div>
                <div id="pre-dC" class="preview-item v-text"></div>
                <div id="pre-lu" class="preview-item v-text"></div>
                <div id="pre-bC" class="preview-item v-text"></div>
                <div id="pre-gC" class="preview-item v-text"></div>
                <div id="pre-vN" class="preview-item v-text"></div>
                <div id="pre-vA" class="preview-item v-text"></div>
                <div class="preview-item parent-box">
                    <div id="pre-bM" class="p-name"></div>
                    <div id="pre-bF" class="p-name"></div>
                    <div id="pre-gM" class="p-name"></div>
                    <div id="pre-gF" class="p-name"></div>
                </div>
                <div class="footer-pre footer-left">
                    <div id="l-logo" class="pre-logo"></div>
                    <div class="pre-info">
                        <div id="l-pname" class="pre-pname"></div>
                        <div id="l-tc" class="pre-tc"></div>
                    </div>
                </div>
                <div class="footer-pre footer-right">
                    <div id="r-logo" class="pre-logo"></div>
                    <div class="pre-info">
                        <div id="r-pname" class="pre-pname"></div>
                        <div id="r-tc" class="pre-tc"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
