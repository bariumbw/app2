<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>囍帖預覽器 V2 - Bespoke Mall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --wedding-text: #632A31;
        }
        body {
            background-color: #f0f2f5;
            font-family: 'Noto Serif TC', serif;
        }
        /* 畫布容器：固定比例並支援縮放預覽 */
        .preview-wrapper {
            width: 1000px;
            height: 707px;
            position: relative;
            background-image: url('5.jpg');
            background-size: cover;
            background-position: center;
            margin: 0 auto;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            background-color: #fff;
            overflow: hidden;
        }

        /* 西式區塊：內容超長時自動縮小文字 */
        .western-area {
            position: absolute;
            top: 60px;
            left: 45px;
            width: 420px;
            height: 520px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--wedding-text);
            pointer-events: none;
        }
        .western-names {
            width: 100%;
            height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: 50px;
            line-height: 1.1;
            text-align: center;
        }
        .western-details {
            margin-top: 100px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: bold;
            text-align: center;
        }

        /* 中式區塊 (直排)：內容超長時自動縮小文字 */
        .chinese-container {
            position: absolute;
            top: 130px;
            right: 55px;
            height: 400px;
            width: 430px;
            writing-mode: vertical-rl;
            color: var(--wedding-text);
            display: flex;
            flex-direction: row-reverse;
            gap: 15px;
            font-size: 17px;
            line-height: 1.6;
            pointer-events: none;
        }
        .ch-title {
            font-size: 34px;
            font-weight: bold;
            margin-right: 20px;
            letter-spacing: 12px;
        }

        /* 禮券 Logo 同步顯示區域 */
        .voucher-box {
            position: absolute;
            bottom: 35px;
            width: 430px;
            height: 160px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 12px;
            padding: 10px;
        }
        .v-left { left: 40px; }
        .v-right { right: 40px; }
        .v-item {
            height: 45px;
            width: auto;
            object-fit: contain;
        }

        /* 控制面板樣式 */
        .config-scroll {
            max-height: 95vh;
            overflow-y: auto;
        }
        .tc-box {
            font-size: 11px;
            color: #71717a;
            background: #f8fafc;
            padding: 8px;
            border-radius: 4px;
            margin-top: 4px;
            display: block;
            word-break: break-all;
        }
    </style>
</head>
<body class="p-2 md:p-6">

    <div class="max-w-[1550px] mx-auto flex flex-col xl:flex-row gap-6">
        
        <div class="w-full xl:w-1/3 bg-white p-6 rounded-2xl shadow-xl config-scroll">
            <h1 class="text-2xl font-bold mb-6 text-gray-800 border-b pb-4">囍帖預覽器 V2</h1>
            
            <div class="space-y-6">
                <section class="border-l-4 border-blue-500 pl-4">
                    <h3 class="font-bold text-blue-800 mb-3">01 西式囍帖</h3>
                    <div class="grid gap-3 text-sm">
                        <input type="text" id="brideEn" value="Rosesalina" class="p-2 border rounded" oninput="update()">
                        <input type="text" id="groomEn" value="Benjamin" class="p-2 border rounded" oninput="update()">
                        <input type="date" id="dateInput" value="2026-10-15" class="p-2 border rounded" oninput="update()">
                        <input type="text" id="venueEn" value="FOUR SEASONS GRAND BALLROOM" class="p-2 border rounded" oninput="update()">
                        <input type="text" id="addrEn" value="8 FINANCE STREET, CENTRAL, HONG KONG" class="p-2 border rounded" oninput="update()">
                    </div>
                </section>

                <section class="border-l-4 border-red-500 pl-4">
                    <h3 class="font-bold text-red-800 mb-3">02 中式囍帖</h3>
                    <div class="grid gap-3 text-sm">
                        <div class="flex gap-2">
                            <input type="text" id="brideCh" value="嘉欣" class="w-full p-2 border rounded" oninput="update()">
                            <input type="text" id="groomCh" value="大文" class="w-full p-2 border rounded" oninput="update()">
                        </div>
                        <input type="text" id="venueCh" value="香港四季酒店 · 四季大禮堂" class="p-2 border rounded" oninput="update()">
                        <input type="text" id="addrCh" value="香港中環金融街 8 號" class="p-2 border rounded" oninput="update()">
                    </div>
                </section>

                <section class="border-l-4 border-gray-500 pl-4">
                    <h3 class="font-bold text-gray-800 mb-3">03 禮券產品 (16款)</h3>
                    <div id="productContainer" class="space-y-4">
                        </div>
                </section>
            </div>
        </div>

        <div class="w-full xl:w-2/3 flex justify-center items-start bg-zinc-400 p-4 md:p-10 rounded-3xl overflow-x-auto">
            <div id="captureArea" class="preview-wrapper">
                
                <div class="western-area">
                    <div class="western-names" id="autoScaleNames">
                        <span id="drawBrideEn"></span><br>
                        <span style="font-size: 0.6em; font-family: serif; font-style: normal;">&</span><br>
                        <span id="drawGroomEn"></span>
                    </div>
                    <div class="western-details" id="autoScaleDetails">
                        <div id="drawDateEn" class="text-xl mb-2 uppercase"></div>
                        <div id="drawVenueEn" class="text-lg"></div>
                        <div id="drawAddrEn" class="text-xs mt-1 opacity-80"></div>
                    </div>
                </div>

                <div class="chinese-container" id="autoScaleChinese">
                    <div id="drawDateCh"></div>
                    <div>為 <span class="font-bold">小女<span id="drawBrideCh"></span></span> <span class="font-bold">小兒<span id="drawGroomCh"></span></span> 結婚之喜</div>
                    <div>是晚假座 <span id="drawVenueCh"></span></div>
                    <div id="drawAddrCh"></div>
                    <div class="ch-title">光臨 恭候</div>
                    <div class="mt-28 text-sm">六時恭候 八時入席</div>
                </div>

                <div id="vBoxL" class="voucher-box v-left"></div>
                <div id="vBoxR" class="voucher-box v-right"></div>

            </div>
        </div>

        // 輔助：自動縮小文字字體
        function autoShrinkText(element, maxHeight) {
            let fontSize = parseInt(window.getComputedStyle(element).fontSize);
            while (element.scrollHeight > maxHeight && fontSize > 8) {
                fontSize--;
                element.style.fontSize = fontSize + "px";
            }
        }

        // 輔助：數字轉中文數字
        function toChNum(n) {
            const map = ['零','一','二','三','四','五','六','七','八','九','十'];
            return n.toString().split('').map(i => map[parseInt(i)]).join('');
        }

        // 初始化
        function init() {
            const container = document.getElementById('productContainer');
            products.forEach((p, index) => {
                const item = document.createElement('div');
                item.className = "bg-white p-3 border rounded-lg hover:border-blue-300 transition shadow-sm";
                item.innerHTML = `
                    <label class="flex items-start gap-3 cursor-pointer">
                        <input type="checkbox" value="${p.brand}" class="product-check mt-1" onchange="update()">
                        <div class="flex-1">
                            <span class="font-bold text-gray-800">${p.brand}</span>
                            <span class="text-gray-600 block text-xs">${p.name}</span>
                            <div class="tc-box mt-2"><strong>T&C:</strong> ${p.tc}</div>
                        </div>
                    </label>
                `;
                container.appendChild(item);
            });
            update();
        }

        // 更新函數
        function update() {
            // 西式更新
            const brideEn = document.getElementById('brideEn').value;
            const groomEn = document.getElementById('groomEn').value;
            const venueEn = document.getElementById('venueEn').value;
            const addrEn = document.getElementById('addrEn').value;
            
            document.getElementById('drawBrideEn').innerText = brideEn;
            document.getElementById('drawGroomEn').innerText = groomEn;
            document.getElementById('drawVenueEn').innerText = venueEn;
            document.getElementById('drawAddrEn').innerText = addrEn;

            const dateVal = new Date(document.getElementById('dateInput').value);
            const enOpt = { month: 'long', day: 'numeric', year: 'numeric' };
            document.getElementById('drawDateEn').innerText = dateVal.toLocaleDateString('en-US', enOpt);

            // 中式更新
            document.getElementById('drawBrideCh').innerText = document.getElementById('brideCh').value;
            document.getElementById('drawGroomCh').innerText = document.getElementById('groomCh').value;
            document.getElementById('drawVenueCh').innerText = document.getElementById('venueCh').value;
            document.getElementById('drawAddrCh').innerText = document.getElementById('addrCh').value;

            const week = ["日", "一", "二", "三", "四", "五", "六"][dateVal.getDay()];
            const chYear = toChNum(dateVal.getFullYear());
            const chMonth = dateVal.getMonth() + 1;
            const chDay = dateVal.getDate();
            
            // 農曆範例固定 (可串接 API)
            let lunar = "丙午年九月 初六";
            if(document.getElementById('dateInput').value !== '2026-10-15') lunar = "丙午年吉月 吉日";

            document.getElementById('drawDateCh').innerHTML = `
                謹訂於 公曆 ${chYear}年${chMonth}月${chDay}日 (星期${week})<br>
                農曆 ${lunar}
            `;

            // 執行自動縮放檢查
            const nameEl = document.getElementById('autoScaleNames');
            nameEl.style.fontSize = "50px"; // 重置
            autoShrinkText(nameEl, 250);

            const detailEl = document.getElementById('autoScaleDetails');
            detailEl.style.fontSize = "18px"; // 重置
            autoShrinkText(detailEl, 150);

            const chEl = document.getElementById('autoScaleChinese');
            chEl.style.fontSize = "17px"; // 重置
            // 中式直排縮放邏輯
            if (chEl.scrollWidth > 430) {
                let fs = 17;
                while(chEl.scrollWidth > 430 && fs > 10) {
                    fs--;
                    chEl.style.fontSize = fs + "px";
                }
            }

            // 禮券同步顯示 (唯一品牌原則)
            const selectedChecks = Array.from(document.querySelectorAll('.product-check:checked'));
            const selectedBrands = [...new Set(selectedChecks.map(c => c.value))];
            
            const leftBox = document.getElementById('vBoxL');
            const rightBox = document.getElementById('vBoxR');
            leftBox.innerHTML = '';
            rightBox.innerHTML = '';

            selectedBrands.forEach(brandName => {
                const logo = brands[brandName];
                if(logo) {
                    const img = `<img src="${logo}" class="v-item" alt="${brandName}">`;
                    leftBox.innerHTML += img;
                    rightBox.innerHTML += img;
                }
            });
        }

        init();
    </script>
</body>
