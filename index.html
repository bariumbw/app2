<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>囍帖預覽器 V2 - Bespoke Mall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --wedding-text: #632A31;
            --brand-primary: #3b82f6;
            --panel-bg: #1e1e1e;
        }
        body {
            background-color: #f4f7f9;
            font-family: 'Inter', 'Noto Serif TC', sans-serif;
            margin: 0;
            overflow: hidden;
        }
        /* 頂部導航列 */
        .top-nav {
            background-color: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 24px;
            z-index: 50;
        }
        /* 主佈局 */
        .main-layout {
            display: flex;
            height: calc(100vh - 60px);
        }
        /* 左側側邊欄 */
        .sidebar {
            width: 400px;
            background-color: var(--panel-bg);
            color: #efefef;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
        }
        /* 分頁標籤樣式 */
        .tab-headers {
            display: flex;
            background: #2d2d2d;
            border-bottom: 1px solid #404040;
        }
        .tab-btn {
            flex: 1;
            padding: 12px 5px;
            font-size: 0.85rem;
            text-align: center;
            cursor: pointer;
            color: #9ca3af;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
        }
        .tab-btn.active {
            color: #fff;
            background: #383838;
            border-bottom: 2px solid var(--brand-primary);
        }
        /* 分頁內容 */
        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .page { display: none; }
        .page.active { display: block; }

        .sidebar label { display: block; font-size: 0.75rem; color: #9ca3af; margin-top: 15px; margin-bottom: 5px; }
        .sidebar input {
            width: 100%;
            background: #2d2d2d;
            border: 1px solid #404040;
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        
        /* 右側預覽區 */
        .preview-pane {
            flex: 1;
            background-color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: auto;
        }
        .card-canvas {
            width: 1000px;
            height: 707px;
            min-width: 1000px;
            position: relative;
            background-image: url('5.jpg');
            background-size: cover;
            background-position: center;
            background-color: #fff;
            box-shadow: 0 40px 80px rgba(0,0,0,0.3);
        }

        /* 西式文字定位 (對應圖片黃色區) */
        .western-content {
            position: absolute; top: 70px; left: 55px; width: 410px; height: 480px;
            display: flex; flex-direction: column; align-items: center; color: var(--wedding-text); pointer-events: none;
        }
        .w-names { width: 100%; height: 240px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Georgia', serif; font-style: italic; font-size: 48px; text-align: center; }
        .w-details { margin-top: 90px; width: 100%; text-align: center; font-weight: bold; }
        
        /* 中式文字定位 (對應圖片黃色區) */
        .chinese-content {
            position: absolute; top: 135px; right: 60px; height: 390px; width: 420px;
            writing-mode: vertical-rl; color: var(--wedding-text); display: flex; flex-direction: row-reverse; gap: 18px; font-size: 17px; line-height: 1.6;
        }
        .ch-title-main { font-size: 34px; font-weight: bold; margin-right: 20px; letter-spacing: 12px; }

        /* 禮券品牌顯示區 */
        .voucher-area { position: absolute; bottom: 40px; width: 430px; height: 150px; display: flex; flex-wrap: wrap; justify-content: center; align-content: center; gap: 12px; }
        .v-l { left: 45px; } .v-r { right: 45px; }
        .v-img { height: 42px; width: auto; object-fit: contain; }

        /* 品牌產品清單樣式 */
        .product-item { background: #2d2d2d; border: 1px solid #404040; border-radius: 8px; padding: 12px; margin-bottom: 12px; transition: 0.2s; }
        .product-item:hover { border-color: var(--brand-primary); }
        .tc-scroll { font-size: 10px; color: #888; margin-top: 10px; padding-top: 8px; border-top: 1px solid #444; max-height: 50px; overflow-y: auto; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="text-xl font-bold text-gray-800 flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center text-white text-xs">BM</div>
            Wedding Designer Professional
        </div>
    </nav>

    <div class="main-layout">
        <aside class="sidebar">
            <div class="tab-headers">
                <div class="tab-btn active" onclick="openTab(event, 'page-west')">西式資料</div>
                <div class="tab-btn" onclick="openTab(event, 'page-east')">中式資料</div>
                <div class="tab-btn" onclick="openTab(event, 'page-brand')">禮券品牌</div>
            </div>

            <div class="tab-content">
                <div id="page-west" class="page active">
                    <label>Bride's Name</label>
                    <input type="text" id="bE" value="Rosesalina" oninput="upd()">
                    <label>Groom's Name</label>
                    <input type="text" id="gE" value="Benjamin" oninput="upd()">
                    <label>Wedding Date</label>
                    <input type="date" id="dI" value="2026-10-15" oninput="upd()">
                    <label>Venue Name</label>
                    <input type="text" id="vE" value="FOUR SEASONS GRAND BALLROOM" oninput="upd()">
                    <label>Venue Address</label>
                    <input type="text" id="aE" value="8 FINANCE STREET, CENTRAL, HONG KONG" oninput="upd()">
                </div>

                <div id="page-east" class="page">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label>新娘姓名</label>
                            <input type="text" id="bC" value="嘉欣" oninput="upd()">
                        </div>
                        <div>
                            <label>新郎姓名</label>
                            <input type="text" id="gC" value="大文" oninput="upd()">
                        </div>
                    </div>
                    <label>公曆日期</label>
                    <input type="date" id="dCI" value="2026-10-15" oninput="upd()">
                    <label>農曆日期</label>
                    <input type="text" id="dLunar" value="丙午年九月 初六" oninput="upd()">
                    <label>中式場地</label>
                    <input type="text" id="vC" value="香港四季酒店 · 四季大禮堂" oninput="upd()">
                    <label>中式地址</label>
                    <input type="text" id="aC" value="香港中環金融街 8 號" oninput="upd()">
                </div>

                <div id="page-brand" class="page">
                    <p class="text-[10px] text-gray-500 mb-4">請勾選欲顯示於囍帖底部的品牌禮券：</p>
                    <div id="plist"></div>
                </div>
            </div>
        </aside>

        <main class="preview-pane">
            <div id="card" class="card-canvas">
                <div class="western-content">
                    <div class="w-names" id="scaleN">
                        <span id="dBEn"></span><br>
                        <span style="font-size: 28px; font-style: normal;">&</span><br>
                        <span id="dGEn"></span>
                    </div>
                    <div class="w-details" id="scaleD">
                        <div id="dDEn" class="text-xl mb-2 uppercase"></div>
                        <div id="dVEn" class="text-lg"></div>
                        <div id="dAEn" class="text-xs opacity-75"></div>
                    </div>
                </div>

                <div class="chinese-content" id="scaleC">
                    <div id="dDCh"></div>
                    <div>為 <span class="font-bold">小女<span id="dBCh"></span></span> <span class="font-bold">小兒<span id="dGCh"></span></span> 結婚之喜</div>
                    <div>是晚假座 <span id="dVCh"></span></div>
                    <div id="dACh"></div>
                    <div class="ch-title-main">光臨 恭候</div>
                    <div class="mt-32 text-sm">六時恭候 八時入席</div>
                </div>

                <div id="lBox" class="voucher-area v-l"></div>
                <div id="rBox" class="voucher-area v-r"></div>
            </div>
        </main>
    </div>
    <script>
        // 分頁切換邏輯
        function openTab(evt, tabName) {
            let i, page, tablinks;
            page = document.getElementsByClassName("page");
            for (i = 0; i < page.length; i++) { page[i].style.display = "none"; }
            tablinks = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tablinks.length; i++) { tablinks[i].classList.remove("active"); }
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.classList.add("active");
        }

            "奇華餅家": "https://media.langhamplace.com.hk/cms/store/ENcscXXFp.png"

            { b: "Lady M", n: "$80 禮券", t: "voucher Terms & Conditions: The certificate can only be used to redeem takeaway cakes and drinks at Lady M Hong Kong The certificate can only be used in Hong Kong The certificate is not applicable for any whole cake pre-order, merchandize or dine-in order The certificate must be presented upon purchase The certificate cannot be used in conjunction with other promotions The certificate is only valid when stamped by Lady M Hong Kong The certificate is non-refundable or non-exchangeable for cash The redemption item is subject to availability Damaged, altered or expired certificate will not be accepted Lady M Hong Kong reserves the right to amend the above terms without prior notice Lady M Hong Kong reserves the right of all final decisions in case of any dispute" },
            { b: "Lady M", n: "$150 禮券", t: "voucher Terms & Conditions: The certificate can only be used to redeem takeaway cakes and drinks at Lady M Hong Kong The certificate can only be used in Hong Kong The certificate is not applicable for any whole cake pre-order, merchandize or dine-in order The certificate must be presented upon purchase The certificate cannot be used in conjunction with other promotions The certificate is only valid when stamped by Lady M Hong Kong The certificate is non-refundable or non-exchangeable for cash The redemption item is subject to availability Damaged, altered or expired certificate will not be accepted Lady M Hong Kong reserves the right to amend the above terms without prior notice Lady M Hong Kong reserves the right of all final decisions in case of any dispute" },
            { b: "華御結", n: "HK$25 禮券", t: "使用細則及條款 ： 此券適用於華御結各分店(SOGO分店除外）。此券不得兌換現金、轉讓，並恕不作退款或現金找贖。此券不適用於購買套餐，及不可與其他優惠同時使用。此券之影印本無效。此券如經塗改、損壞、模糊及逾期，即屬作廢。華御結保留更改此券使用條款之權利及任何爭議之最終決定權。" },
            { b: "華御結", n: "HK$50 禮券", t: "使用細則及條款 ： 此券適用於華御結各分店(SOGO分店除外）。此券不得兌換現金、轉讓，並恕不作退款或現金找贖。此券不適用於購買套餐，及不可與其他優惠同時使用。此券之影印本無效。此券如經塗改、損壞、模糊及逾期，即屬作廢。華御結保留更改此券使用條款之權利及任何爭議之最終決定權。" },
            { b: "東海堂", n: "HK$25 禮券 (A)", t: "東海堂條款及細則： 憑此券可於有效期內在東海堂有限公司（“東海堂”）旗下位於香港特別行政區境內之東海堂餅店換領總值HK$50之禮餅（以折扣前零售價計算） 此券不適用於電話、手機程式或網上購物 此券只適用於換領禮餅，不適用於換領任何東海堂餅店寄賣之物品、所有飲品及所有其他產品 請於付款前出示此券 此券不能兌換現金或現金券 此券行使後將不獲發還 行使此券不獲現金 or any format of exchange..." },

            { b: "奇華餅家", n: "金雅喜餅咭", t: "條款及細則：適用於換取奇華金雅喜禮餅一盒。詳情請參閱券背說明。" },

        ];

        // 字體縮放算法
        function shrk(el, maxH, base) {
            let fs = base; el.style.fontSize = fs + "px";
            while ((el.scrollHeight > maxH || el.scrollWidth > el.offsetWidth) && fs > 8) {
                fs--; el.style.fontSize = fs + "px";
            }
        }

        // 數字轉中文
        function toCH(n) {
            const m = ['零','一','二','三','四','五','六','七','八','九','十'];
            return n.toString().split('').map(i => m[parseInt(i)]).join('');
        }

        // 核心更新函數 (即時預覽)
        function upd() {
            // 西式預覽更新
            document.getElementById('dBEn').innerText = document.getElementById('bE').value;
            document.getElementById('dGEn').innerText = document.getElementById('gE').value;
            document.getElementById('dVEn').innerText = document.getElementById('vE').value;
            document.getElementById('dAEn').innerText = document.getElementById('aE').value;
            const dW = new Date(document.getElementById('dI').value);
            document.getElementById('dDEn').innerText = dW.toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});

            // 中式預覽更新
            document.getElementById('dBCh').innerText = document.getElementById('bC').value;
            document.getElementById('dGCh').innerText = document.getElementById('gC').value;
            document.getElementById('dVCh').innerText = document.getElementById('vC').value;
            document.getElementById('dACh').innerText = document.getElementById('aC').value;
            const dC = new Date(document.getElementById('dCI').value);
            const w = ["日","一","二","三","四","五","六"][dC.getDay()];
            const lu = document.getElementById('dLunar').value;
            document.getElementById('dDCh').innerHTML = `謹訂於 公曆 ${toCH(dC.getFullYear())}年${dC.getMonth()+1}月${dC.getDate()}日 (星期${w})<br>農曆 ${lu}`;

            // 執行縮放
            shrk(document.getElementById('scaleN'), 240, 48);
            shrk(document.getElementById('scaleD'), 150, 18);
            const sc = document.getElementById('scaleC');
            sc.style.fontSize = "17px";
            if(sc.scrollWidth > 420) {
                let f = 17; while(sc.scrollWidth > 420 && f > 9) { f--; sc.style.fontSize = f+"px"; }
            }

            // 禮券 Logo 預覽
            const sel = [...new Set(Array.from(document.querySelectorAll('.p-chk:checked')).map(c => c.value))];
            const lb = document.getElementById('lBox'), rb = document.getElementById('rBox');
            lb.innerHTML = rb.innerHTML = '';
            sel.forEach(bn => {
                const img = `<img src="${bLogos[bn]}" class="v-img" alt="${bn}">`;
                lb.innerHTML += img; rb.innerHTML += img;
            });
        }

        // 初始化品牌清單
        const pl = document.getElementById('plist');
        prods.forEach((p, i) => {
            const d = document.createElement('div');
            d.className = "product-item";
            d.innerHTML = `
                <label class="flex items-start gap-3 !mt-0 cursor-pointer">
                    <input type="checkbox" value="${p.b}" class="p-chk mt-1" onchange="upd()">
                    <div class="flex-1">
                        <div class="text-sm font-bold text-white">${p.b}</div>
                        <div class="text-[10px] text-gray-400 uppercase tracking-tighter">${p.n}</div>
                        <div class="tc-scroll">${p.t}</div>
                    </div>
                </label>
            `;
            pl.appendChild(d);
        });

        // 初始執行一次
        upd();
    </script>
</body>
</html>
