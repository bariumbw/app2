    <style>
        :root {
            --wedding-red: #632A31;
            --accent-blue: #3b82f6;
            --glass-bg: rgba(15, 23, 42, 0.8);
        }
        
        body {
            background: #020617;
            font-family: 'Inter', 'Noto Serif TC', sans-serif;
            color: #f8fafc;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 側邊欄玻璃擬態 */
        .glass-sidebar {
            width: 420px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            z-index: 50;
            box-shadow: 20px 0 50px rgba(0,0,0,0.5);
        }

        .nav-tabs {
            display: flex;
            padding: 20px 20px 0;
            gap: 10px;
        }

        .tab-trigger {
            flex: 1;
            padding: 12px 5px;
            font-size: 0.8rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            color: #94a3b8;
            border-radius: 12px 12px 0 0;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }

        .tab-trigger.active {
            color: #fff;
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.2) 0%, rgba(59, 130, 246, 0) 100%);
            border-color: rgba(59, 130, 246, 0.5);
            border-bottom: none;
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            scrollbar-width: none;
        }

        .input-group { margin-bottom: 20px; }
        .input-group label {
            display: block;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #64748b;
            margin-bottom: 8px;
        }
        .input-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px 15px;
            color: #fff;
            font-size: 0.9rem;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.05);
        }

        /* 預覽區域 */
        .preview-container {
            flex: 1;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            padding: 50px;
        }

        .card-canvas {
            width: 1000px;
            height: 707px;
            min-width: 1000px;
            position: relative;
            background-image: url('5.jpg');
            background-size: cover;
            box-shadow: 0 60px 120px -20px rgba(0,0,0,0.7);
        }

        /* 文字預覽 - 再次向上移 7 格 (累計 14 格/28px) */
        .preview-item {
            position: absolute;
            color: var(--wedding-red);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            pointer-events: none;
        }

        /* 西式定位二次修正 */
        #pre-bE { top: 47px; left: 40px; width: 280px; height: 95px; font-family: 'Georgia', serif; font-style: italic; font-size: 40px; }
        #pre-gE { top: 217px; left: 220px; width: 270px; height: 95px; font-family: 'Georgia', serif; font-style: italic; font-size: 40px; }
        #pre-dE { top: 457px; left: 100px; width: 335px; height: 35px; font-weight: bold; font-size: 20px; }
        #pre-vE { top: 517px; left: 80px; width: 335px; height: 35px; font-weight: bold; font-size: 18px; }
        #pre-aE { top: 597px; left: 22px; width: 450px; height: 55px; font-size: 14px; align-items: flex-start; }

        /* 中式定位二次修正 */
        .v-text { writing-mode: vertical-rl; line-height: 1.2; }
        #pre-dC { top: 257px; right: 28px; height: 400px; width: 40px; font-size: 18px; }
        #pre-lu { top: 257px; right: 75px; height: 400px; width: 40px; font-size: 16px; }
        #pre-gC { top: 177px; right: 125px; height: 110px; width: 30px; font-weight: bold; font-size: 20px; }
        #pre-bC { top: 177px; right: 155px; height: 110px; width: 30px; font-weight: bold; font-size: 20px; }
        #pre-vN { top: 177px; right: 215px; height: 380px; width: 30px; font-size: 18px; }
        #pre-vA { top: 177px; right: 245px; height: 380px; width: 30px; font-size: 14px; }
        
        /* 父母名定位二次修正 */
        .parent-box { top: 507px; right: 325px; width: 140px; height: 95px; display: flex; flex-direction: row-reverse; gap: 8px; }
        .p-name { writing-mode: vertical-rl; width: 28px; height: 100%; font-size: 18px; font-weight: bold; }

        /* 底部產品顯示二次修正 (同樣向上移) */
        .footer-pre { position: absolute; bottom: 63px; width: 455px; height: 145px; display: flex; gap: 15px; padding: 10px; }
        .footer-left { left: 22px; } .footer-right { right: 22px; }
        .pre-logo { width: 110px; height: 100%; display: flex; align-items: center; justify-content: center; }
        .pre-logo img { max-width: 100%; max-height: 50px; }
        .pre-info { flex: 1; text-align: left; display: flex; flex-direction: column; justify-content: flex-start; }

        .pre-tc { font-size: 10px; line-height: 1.2; overflow: hidden; color: var(--wedding-red); }

        .prod-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 15px; margin-bottom: 12px; }
    </style>
</head>

            "Lady M": "https://img.shoplineapp.com/media/image_clips/5b7a801b8f90480017e4ca83/original.png?1534754834",
            "東海堂": "https://www.aromebakery.com.hk/arome/images/logo_v2.png",
            "華御結": "https://www.pacificplace.com.hk/-/media/images/pacificplace2/starstreet/hana-musubi/hana-musubi_logo_apr2022_1.ashx?rev=973c0e9ef342404e845ed5a7f85bd14b&hash=9d532561b9d0e798e9ffc0f878c54d79",
            "奇華餅家": "https://media.langhamplace.com.hk/cms/store/ENcscXXFp.png"
        };

        // 3. 全自動縮放核心算法 (當字數多時自動縮小字體)
        function autoShrink(el, maxH, baseSize) {
            let size = baseSize;
            el.style.fontSize = size + "px";
            // 當高度溢出或寬度溢出時遞減
            while ((el.scrollHeight > maxH || el.scrollWidth > el.offsetWidth) && size > 6) {
                size -= 0.5;
                el.style.fontSize = size + "px";
            }
        }

        function toChineseNum(n) {
            const map = ['零','一','二','三','四','五','六','七','八','九','十'];
            return n.toString().split('').map(i => map[parseInt(i)] || i).join('');
        }

        // 4. 主要渲染邏輯
        function render() {
            // 西式內容
            document.getElementById('pre-bE').innerText = document.getElementById('in-bE').value;
            document.getElementById('pre-gE').innerText = document.getElementById('in-gE').value;
            document.getElementById('pre-vE').innerText = document.getElementById('in-vE').value;
            document.getElementById('pre-aE').innerText = document.getElementById('in-aE').value;
            const dw = new Date(document.getElementById('in-dE').value);
            document.getElementById('pre-dE').innerText = dw.toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});

            // 中式內容
            document.getElementById('pre-bC').innerText = document.getElementById('in-bC').value;
            document.getElementById('pre-gC').innerText = document.getElementById('in-gC').value;
            document.getElementById('pre-vN').innerText = document.getElementById('in-vN').value;
            document.getElementById('pre-vA').innerText = document.getElementById('in-vA').value;
            document.getElementById('pre-lu').innerText = "農曆 " + document.getElementById('in-lu').value;
            const dc = new Date(document.getElementById('in-dC').value);
            const week = ["日","一","二","三","四","五","六"][dc.getDay()];
            document.getElementById('pre-dC').innerText = `公曆 ${toChineseNum(dc.getFullYear())}年${dc.getMonth()+1}月${dc.getDate()}日 (星期${week})`;

            // 父母名內容
            document.getElementById('pre-bF').innerText = document.getElementById('in-bF').value;
            document.getElementById('pre-bM').innerText = document.getElementById('in-bM').value;
            document.getElementById('pre-gF').innerText = document.getElementById('in-gF').value;
            document.getElementById('pre-gM').innerText = document.getElementById('in-gM').value;

            // 執行自動縮放 (高度基準與框的大小一致)
            autoShrink(document.getElementById('pre-bE'), 95, 40);
            autoShrink(document.getElementById('pre-gE'), 95, 40);
            autoShrink(document.getElementById('pre-vE'), 35, 18);
            autoShrink(document.getElementById('pre-aE'), 55, 14);
            autoShrink(document.getElementById('pre-vN'), 380, 18);
            autoShrink(document.getElementById('pre-vA'), 380, 14);

            // 底部禮券聯動邏輯
            const selected = document.querySelectorAll('.p-check:checked');
            const leftBox = { logo: 'l-logo', name: 'l-pname', tc: 'l-tc' };
            const rightBox = { logo: 'r-logo', name: 'r-pname', tc: 'r-tc' };
            
            [leftBox, rightBox].forEach(box => {
                document.getElementById(box.logo).innerHTML = '';
                document.getElementById(box.name).innerText = '';
                document.getElementById(box.tc).innerText = '';
                
                if(selected.length > 0) {
                    const idx = selected[0].getAttribute('data-idx');
                    const p = products[idx];
                    document.getElementById(box.logo).innerHTML = `<img src="${brandLogos[p.b]}" alt="logo">`;
                    document.getElementById(box.name).innerText = p.b + " " + p.n;
                    document.getElementById(box.tc).innerText = p.t;
                    autoShrink(document.getElementById(box.tc), 110, 10);
                }
            });
        }

        // 5. 初始化產品清單
        const container = document.getElementById('product-list');
        products.forEach((p, i) => {
            const div = document.createElement('div');
            div.className = "prod-card";
            div.innerHTML = `
                <label class="flex items-start gap-4 cursor-pointer">
                    <input type="checkbox" data-idx="${i}" class="p-check mt-1 w-5 h-5 rounded border-slate-700 bg-slate-900 checked:bg-blue-600" onchange="render()">
                    <div class="flex-1">
                        <div class="text-sm font-bold text-white">${p.b}</div>
                        <div class="text-[10px] text-blue-400 font-bold uppercase tracking-widest mb-1">${p.n}</div>
                        <div class="text-[9px] text-slate-500 leading-tight max-h-[40px] overflow-hidden">${p.t.substring(0, 60)}...</div>
                    </div>
                </label>
            `;
            container.appendChild(div);
        });

        window.onload = render;
    </script>
</body>
</html>
