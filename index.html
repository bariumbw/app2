<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>囍帖預覽器 V2 - Bespoke Mall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --wedding-text: #632A31;
            --brand-primary: #3b82f6;
            --panel-bg: #1e1e1e;
        }
        body {
            background-color: #f4f7f9;
            font-family: 'Inter', 'Noto Serif TC', sans-serif;
            margin: 0;
            overflow: hidden;
        }
        /* 頂部導航列 */
        .top-nav {
            background-color: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 24px;
            z-index: 50;
        }
        /* 主佈局：左側控制，右側預覽 */
        .main-layout {
            display: flex;
            height: calc(100vh - 60px);
        }
        /* 左側控制欄 */
        .sidebar {
            width: 380px;
            background-color: var(--panel-bg);
            color: #efefef;
            overflow-y: auto;
            padding: 24px;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
        }
        .sidebar h2 { color: #fff; font-size: 1.1rem; margin-bottom: 20px; border-left: 4px solid var(--brand-primary); padding-left: 12px; }
        .sidebar label { display: block; font-size: 0.75rem; color: #9ca3af; margin-top: 12px; margin-bottom: 4px; }
        .sidebar input[type="text"], .sidebar input[type="date"] {
            width: 100%;
            background: #2d2d2d;
            border: 1px solid #404040;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        /* 右側預覽區 */
        .preview-pane {
            flex: 1;
            background-color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            overflow: auto;
        }
        /* 囍帖畫布 */
        .card-canvas {
            width: 1000px;
            height: 707px;
            min-width: 1000px;
            position: relative;
            background-image: url('5.jpg');
            background-size: cover;
            background-position: center;
            background-color: #fff;
            box-shadow: 0 40px 80px rgba(0,0,0,0.3);
        }
        /* 文字定位與自動縮放 */
        .western-content {
            position: absolute;
            top: 70px;
            left: 55px;
            width: 410px;
            height: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--wedding-text);
            pointer-events: none;
        }
        .w-names {
            width: 100%;
            height: 240px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: 48px;
            text-align: center;
        }
        .w-details {
            margin-top: 90px;
            width: 100%;
            text-align: center;
            font-weight: bold;
        }
        .chinese-content {
            position: absolute;
            top: 135px;
            right: 60px;
            height: 390px;
            width: 420px;
            writing-mode: vertical-rl;
            color: var(--wedding-text);
            display: flex;
            flex-direction: row-reverse;
            gap: 18px;
            font-size: 17px;
            line-height: 1.6;
        }
        .ch-title-main { font-size: 34px; font-weight: bold; margin-right: 20px; letter-spacing: 12px; }
        
        /* 禮券樣式 */
        .voucher-area {
            position: absolute;
            bottom: 40px;
            width: 430px;
            height: 150px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 12px;
        }
        .v-l { left: 45px; }
        .v-r { right: 45px; }
        .v-img { height: 42px; width: auto; object-fit: contain; }

        /* T&C 顯示盒 */
        .product-item {
            background: #2d2d2d;
            border: 1px solid #404040;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 12px;
            cursor: pointer;
        }
        .product-item:hover { border-color: var(--brand-primary); }
        .tc-content { font-size: 10px; color: #888; margin-top: 8px; display: block; height: 40px; overflow-y: auto; border-top: 1px solid #444; pt-2; }
    </style>
</head>

    <div class="top-nav">
        <div class="text-xl font-bold text-gray-800 flex items-center gap-2">
            <span class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center text-white text-sm">B</span>
            Bespoke Mall - Wedding Invitation Designer

    </div>

                <input type="text" id="vE" value="FOUR SEASONS GRAND BALLROOM" oninput="upd()">
                <label>Venue Address</label>
                <input type="text" id="aE" value="8 FINANCE STREET, CENTRAL, HONG KONG" oninput="upd()">
            </section>

            <section class="mb-8">
                <h2>中式資料</h2>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label>新娘姓名</label>
                        <input type="text" id="bC" value="嘉欣" oninput="upd()">
                    </div>
                    <div>
                        <label>新郎姓名</label>
                        <input type="text" id="gC" value="大文" oninput="upd()">
                    </div>
                </div>
                <label>中式場地</label>

                <label>中式地址</label>

            <section>

                <div id="plist"></div>
            </section>
        </aside>

            <div id="card" class="card-canvas">
                
                <div class="western-content">
                    <div class="w-names" id="scaleN">
                        <span id="dBEn"></span><br>
                        <span style="font-size: 28px; font-style: normal;">&</span><br>
                        <span id="dGEn"></span>
                    </div>
                    <div class="w-details" id="scaleD">
                        <div id="dDEn" class="text-xl mb-2 uppercase"></div>
                        <div id="dVEn" class="text-lg"></div>
                        <div id="dAEn" class="text-xs opacity-75"></div>
                    </div>
                </div>

                    <div id="dDCh"></div>
                    <div>為 <span class="font-bold">小女<span id="dBCh"></span></span> <span class="font-bold">小兒<span id="dGCh"></span></span> 結婚之喜</div>
                    <div>是晚假座 <span id="dVCh"></span></div>
                    <div id="dACh"></div>
                    <div class="ch-title-main">光臨 恭候</div>
                    <div class="mt-32 text-sm">六時恭候 八時入席</div>
                </div>

                <div id="lBox" class="voucher-area v-l"></div>
                <div id="rBox" class="voucher-area v-r"></div>

            </div>
        </main>

        function shrk(el, maxH, base) {
            let fs = base; el.style.fontSize = fs + "px";
            while ((el.scrollHeight > maxH || el.scrollWidth > el.offsetWidth) && fs > 8) {
                fs--; el.style.fontSize = fs + "px";
            }
        }

        function toCH(n) {
            const m = ['零','一','二','三','四','五','六','七','八','九','十'];
            return n.toString().split('').map(i => m[parseInt(i)]).join('');
        }

        function upd() {
            document.getElementById('dBEn').innerText = document.getElementById('bE').value;
            document.getElementById('dGEn').innerText = document.getElementById('gE').value;
            document.getElementById('dVEn').innerText = document.getElementById('vE').value;
            document.getElementById('dAEn').innerText = document.getElementById('aE').value;
            
            const d = new Date(document.getElementById('dI').value);
            document.getElementById('dDEn').innerText = d.toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});

            document.getElementById('dBCh').innerText = document.getElementById('bC').value;
            document.getElementById('dGCh').innerText = document.getElementById('gC').value;
            document.getElementById('dVCh').innerText = document.getElementById('vC').value;
            document.getElementById('dACh').innerText = document.getElementById('aC').value;

            const w = ["日","一","二","三","四","五","六"][d.getDay()];
            let lu = (document.getElementById('dI').value === '2026-10-15') ? "丙午年九月 初六" : "丙午年吉月 吉日";
            document.getElementById('dDCh').innerHTML = `謹訂於 公曆 ${toCH(d.getFullYear())}年${d.getMonth()+1}月${d.getDate()}日 (星期${w})<br>農曆 ${lu}`;

            shrk(document.getElementById('scaleN'), 240, 48);
            shrk(document.getElementById('scaleD'), 150, 18);
            
            const sc = document.getElementById('scaleC');
            sc.style.fontSize = "17px";
            if(sc.scrollWidth > 420) {
                let f = 17; while(sc.scrollWidth > 420 && f > 9) { f--; sc.style.fontSize = f+"px"; }
            }

            const sel = [...new Set(Array.from(document.querySelectorAll('.p-chk:checked')).map(c => c.value))];
            const lb = document.getElementById('lBox'), rb = document.getElementById('rBox');
            lb.innerHTML = rb.innerHTML = '';
            sel.forEach(bn => {
                const img = `<img src="${bLogos[bn]}" class="v-img" alt="${bn}">`;
                lb.innerHTML += img; rb.innerHTML += img;
            });
        }

        const pl = document.getElementById('plist');
        prods.forEach((p, i) => {
            const d = document.createElement('div');
            d.className = "product-item";
            d.innerHTML = `
                <label class="flex items-start gap-3 !mt-0 cursor-pointer">
                    <input type="checkbox" value="${p.b}" class="p-chk mt-1" onchange="upd()">
                    <div class="flex-1">
                        <div class="text-sm font-bold text-white">${p.b}</div>
                        <div class="text-xs text-gray-400">${p.n}</div>
                        <div class="tc-content">${p.t}</div>
                    </div>
                </label>
            `;
            pl.appendChild(d);
        });

        upd();
