<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Card Designer - Bespoke Mall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --wedding-red: #632A31; --accent-blue: #3b82f6; --glass-bg: rgba(15, 23, 42, 0.9); }
        body { background: #020617; font-family: 'Inter', sans-serif; color: #f8fafc; margin: 0; min-height: 100vh; }
        
        .glass-sidebar { width: 400px; background: var(--glass-bg); backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; height: 100vh; position: fixed; left: 0; top: 0; z-index: 50; }
        .nav-tabs { display: flex; padding: 20px; gap: 8px; }
        .tab-trigger { flex: 1; padding: 10px; font-size: 0.7rem; font-weight: 600; text-align: center; cursor: pointer; color: #64748b; border-radius: 8px; background: rgba(255, 255, 255, 0.03); transition: 0.2s; }
        .tab-trigger.active { color: #fff; background: var(--accent-blue); }
        .scroll-area { flex: 1; overflow-y: auto; padding: 20px; }
        
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 0.6rem; text-transform: uppercase; color: #94a3b8; margin-bottom: 4px; }
        .input-group input { width: 100%; background: #000; border: 1px solid #334155; border-radius: 6px; padding: 8px 12px; color: #fff; font-size: 0.9rem; }

        .preview-container { margin-left: 400px; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: #070a13; padding: 40px; }
        .card-canvas { width: 1000px; height: 707px; position: relative; background-image: url('5.jpg'); background-size: cover; box-shadow: 0 40px 80px rgba(0,0,0,0.6); background-color: #fff; }
        .preview-item { position: absolute; color: var(--wedding-red); display: flex; justify-content: center; align-items: center; text-align: center; pointer-events: none; }

        .v-text { writing-mode: vertical-rl; line-height: 1.2; }

        /* --- WESTERN 定位 --- */
        #pre-bE { top: 17px; left: 6px; width: 350px; height: 120px; font-family: 'Georgia', serif; font-style: italic; font-size: 50px; }
        #pre-gE { top: 147px; left: 210px; width: 350px; height: 120px; font-family: 'Georgia', serif; font-style: italic; font-size: 50px; }
        #pre-dE { top: 347px; left: 80px; width: 335px; height: 35px; font-weight: bold; font-size: 20px; }
        #pre-vE { top: 407px; left: 80px; width: 335px; height: 35px; font-weight: bold; font-size: 18px; }
        #pre-aE { top: 437px; left: 22px; width: 450px; height: 55px; font-size: 14px; align-items: flex-start; }

        /* --- CHINESE 定位 --- */
        #pre-dC { top: 143px; right: 30px; height: 400px; width: 40px; font-size: 18px; }
        #pre-lu { top: 83px; right: 57px; height: 400px; width: 40px; font-size: 16px; }
        #pre-gC { top: 101px; right: 99px; height: 110px; width: 30px; font-weight: bold; font-size: 20px; }
        #pre-bC { top: 101px; right: 129px; height: 110px; width: 30px; font-weight: bold; font-size: 20px; }
        #pre-vN { top: 25px; right: 183px; height: 380px; width: 30px; font-size: 18px; }
        #pre-vA { top: 77px; right: 161px; height: 380px; width: 30px; font-size: 16px; }
        
        /* 時間顯示：最新位置位移 */
        #pre-time-box { top: 30px; right: 380px; height: 300px; width: 40px; font-size: 22px; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 40px; }

        .parent-box { top: 357px; right: 305px; width: 140px; height: 95px; display: flex; flex-direction: row-reverse; gap: 8px; }
        .p-name { writing-mode: vertical-rl; width: 28px; height: 100%; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

    <aside class="glass-sidebar">
        <div class="p-6 font-bold text-xl tracking-tighter">Bespoke Mall Designer</div>
        <div class="nav-tabs">
            <div class="tab-trigger active" onclick="switchTab(event, 'tab-w')">WESTERN</div>
            <div class="tab-trigger" onclick="switchTab(event, 'tab-e')">CHINESE</div>
        </div>
        <div class="scroll-area">
            <div id="tab-w" class="tab-content">
                <div class="input-group"><label>Bride Name</label><input type="text" id="in-bE" value="Rosesalina" oninput="render()"></div>
                <div class="input-group"><label>Groom Name</label><input type="text" id="in-gE" value="Benjamin" oninput="render()"></div>
                <div class="input-group"><label>Wedding Date</label><input type="date" id="in-date" value="2026-04-29" oninput="render()"></div>
                <div class="input-group"><label>Venue Name</label><input type="text" id="in-vE" value="FOUR SEASONS GRAND BALLROOM" oninput="render()"></div>
                <div class="input-group"><label>Venue Address</label><input type="text" id="in-aE" value="8 FINANCE STREET, CENTRAL, HONG KONG" oninput="render()"></div>
            </div>
            <div id="tab-e" class="tab-content hidden">
                <div class="grid grid-cols-2 gap-2">
                    <div class="input-group"><label>新娘</label><input type="text" id="in-bC" value="嘉欣" oninput="render()"></div>
                    <div class="input-group"><label>新郎</label><input type="text" id="in-gC" value="大文" oninput="render()"></div>
                </div>
                <div class="grid grid-cols-2 gap-2 border-t border-white/10 pt-4 mt-2">
                    <div class="input-group"><label>恭候時間 (數字)</label><input type="number" id="in-tWait" value="5" oninput="render()"></div>
                    <div class="input-group"><label>入席時間 (數字)</label><input type="number" id="in-tSit" value="8" oninput="render()"></div>
                </div>
                <div class="input-group"><label>場地名稱</label><input type="text" id="in-vN" value="香港四季酒店 · 四季大禮堂" oninput="render()"></div>
                <div class="input-group"><label>場地地址</label><input type="text" id="in-vA" value="香港中環金融街 8 號" oninput="render()"></div>
                <div class="grid grid-cols-2 gap-2">
                    <div class="input-group"><label>新娘家長</label><input type="text" id="in-bF" value="嘉誠" oninput="render()"><input type="text" id="in-bM" value="美玲" oninput="render()" class="mt-2"></div>
                    <div class="input-group"><label>新郎家長</label><input type="text" id="in-gF" value="建國" oninput="render()"><input type="text" id="in-gM" value="麗珍" oninput="render()" class="mt-2"></div>
                </div>
            </div>
        </div>
    </aside>

    <main class="preview-container">
        <div id="card" class="card-canvas">
            <div id="pre-bE" class="preview-item"></div><div id="pre-gE" class="preview-item"></div>
            <div id="pre-dE" class="preview-item"></div><div id="pre-vE" class="preview-item"></div>
            <div id="pre-aE" class="preview-item"></div>
            
            <div id="pre-dC" class="preview-item v-text"></div><div id="pre-lu" class="preview-item v-text"></div>
            <div id="pre-bC" class="preview-item v-text"></div><div id="pre-gC" class="preview-item v-text"></div>
            <div id="pre-vN" class="preview-item v-text"></div><div id="pre-vA" class="preview-item v-text"></div>
            
            <div id="pre-time-box" class="preview-item v-text">
                <div id="val-wait"></div>
                <div id="val-sit"></div>
            </div>

            <div class="preview-item parent-box">
                <div id="pre-bM" class="p-name"></div><div id="pre-bF" class="p-name"></div>
                <div id="pre-gM" class="p-name"></div><div id="pre-gF" class="p-name"></div>
            </div>
        </div>
    </main>

    <script>
        function switchTab(evt, name) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-trigger').forEach(t => t.classList.remove('active'));
            document.getElementById(name).classList.remove('hidden');
            evt.currentTarget.classList.add('active');
        }

        function toFullChineseNum(n, type = 'default') {
            const map = ['零','一','二','三','四','五','六','七','八','九','十'];
            if (!n && n !== 0) return "";
            
            if (type === 'year') {
                return n.toString().split('').map(i => map[parseInt(i)]).join('');
            }
            
            n = parseInt(n);
            if (n <= 10) return map[n];
            if (n < 20) return '十' + (n % 10 === 0 ? '' : map[n % 10]);
            if (n < 30) return '二十' + (n % 10 === 0 ? '' : map[n % 10]);
            return '三十' + (n % 10 === 0 ? '' : map[n % 10]);
        }

        function getLunarFormatted(dateStr) {
            const date = new Date(dateStr);
            const yearFormatter = new Intl.DateTimeFormat('zh-Hant-u-ca-chinese', { year: 'numeric' });
            let lunarYear = yearFormatter.format(date).replace('年', '');
            
            const zodiacs = ["鼠","牛","虎","兔","龍","蛇","馬","羊","猴","雞","狗","豬"];
            const zodiacIndex = (date.getFullYear() - 4) % 12;
            const zodiac = zodiacs[zodiacIndex];

            const monthFormatter = new Intl.DateTimeFormat('zh-Hant-u-ca-chinese', { month: 'long' });
            const dayFormatter = new Intl.DateTimeFormat('zh-Hant-u-ca-chinese', { day: 'numeric' });
            
            let lunarM = monthFormatter.format(date);
            let lunarD = dayFormatter.format(date);

            // 確保日期轉為中國數字
            const clean = (str) => str.replace(/\d+/g, (m) => toFullChineseNum(m));
            
            return `歲次 ${lunarYear}年（${zodiac}年）${clean(lunarM)}${clean(lunarD)}`;
        }

        function render() {
            const dateVal = document.getElementById('in-date').value;
            const dt = new Date(dateVal);

            // Western
            document.getElementById('pre-bE').innerText = document.getElementById('in-bE').value;
            document.getElementById('pre-gE').innerText = document.getElementById('in-gE').value;
            document.getElementById('pre-vE').innerText = document.getElementById('in-vE').value;
            document.getElementById('pre-aE').innerText = document.getElementById('in-aE').value;
            document.getElementById('pre-dE').innerText = dt.toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});

            // Chinese
            document.getElementById('pre-bC').innerText = document.getElementById('in-bC').value;
            document.getElementById('pre-gC').innerText = document.getElementById('in-gC').value;
            document.getElementById('pre-vN').innerText = document.getElementById('in-vN').value;
            document.getElementById('pre-vA').innerText = document.getElementById('in-vA').value;
            
            // 公曆日期 (去二零二六年，月日轉中國數字)
            const cm = toFullChineseNum(dt.getMonth() + 1);
            const cd = toFullChineseNum(dt.getDate());
            const week = ["日","一","二","三","四","五","六"][dt.getDay()];
            document.getElementById('pre-dC').innerText = `公曆 ${cm}月${cd}日 (星期${week})`;

            // 農曆日期 (歲次 丙午年格式)
            document.getElementById('pre-lu').innerText = getLunarFormatted(dateVal);

            // 時間轉中國數字
            document.getElementById('val-wait').innerText = toFullChineseNum(document.getElementById('in-tWait').value);
            document.getElementById('val-sit').innerText = toFullChineseNum(document.getElementById('in-tSit').value);

            // 家長
            document.getElementById('pre-bM').innerText = document.getElementById('in-bM').value;
            document.getElementById('pre-bF').innerText = document.getElementById('in-bF').value;
            document.getElementById('pre-gM').innerText = document.getElementById('in-gM').value;
            document.getElementById('pre-gF').innerText = document.getElementById('in-gF').value;
        }

        window.onload = render;
    </script>
</body>
</html>
